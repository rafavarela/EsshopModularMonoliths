services:
  eshopdb:
    container_name: eshopdb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=eshopdb
      # Use these specific variables to force the cluster default
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=es_CO.UTF-8 --lc-ctype=es_CO.UTF-8
      - LANG=es_CO.UTF-8
      - LC_ALL=es_CO.UTF-8
    restart: always
    ports:
      - 5432:5432
    volumes:
      - postgres_eshopdb:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s   # optional: give Postgres time to initialize on first start
 