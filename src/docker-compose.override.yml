services:
  eshopdb:
    container_name: eshopdb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=EShopDb
      # Use these specific variables to force the cluster default
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=es_CO.UTF-8 --lc-ctype=es_CO.UTF-8
      - LANG=es_CO.UTF-8
      - LC_ALL=es_CO.UTF-8
    restart: always
    ports:
      - 5432:5432
    volumes:
      - postgres_eshopdb:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s   # optional: give Postgres time to initialize on first start
  distributedcache:
    container_name: distributedcache
    restart: always
    ports:
      - "6379:6379"
  seq:
    container_name: seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    restart: always
    ports:
      - "5341:5341"
      - "9091:80"
  messagebus:
    container_name: messagebus
    hostname: ecommerce-mq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
  identity:
    container_name: identity
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://eshopdb/EShopDb?currentSchema=identity
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
    restart: always
    ports:
      - "9090:8080"
    command:
      - start-dev